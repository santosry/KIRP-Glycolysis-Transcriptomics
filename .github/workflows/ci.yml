name: CI

on:
  push:
    branches: [main, audit-*, v3.*]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: rocker/r-ver:4.4.0  # minimal R; enough to validate structure and run lightweight tests

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update && apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev python3

      - name: Install R packages
        run: |
          R -e 'install.packages(c("dplyr","tibble","stringr","rio","digest","ggplot2","ggrepel","pheatmap","RColorBrewer","tidyr","testthat","plotly","htmlwidgets","igraph","scales"), repos="https://cloud.r-project.org")'
          R -e 'if (!requireNamespace("BiocManager", quietly=TRUE)) install.packages("BiocManager"); BiocManager::install(c("limma","clusterProfiler","org.Hs.eg.db","KEGGREST"), ask=FALSE)'

      - name: Check environment
        run: |
          R -e 'source("scripts/00_environment.R")'

      - name: Run tests
        run: |
          R -e 'testthat::test_dir("tests/testthat")'

      - name: Check no manuscript files tracked
        run: |
          if git ls-files | grep -qE 'manuscrito|MANUSCRIPTO'; then
            echo "ERROR: Manuscript files detected in tracking!"
            git ls-files | grep -E 'manuscrito|MANUSCRIPTO'
            exit 1
          fi
          echo "No manuscript files tracked ✓"

      - name: Check no secrets exposed
        run: |
          if git ls-files | grep -qE '(\.env|credentials|token|secret|password|\.pem|id_rsa)'; then
            echo "ERROR: Potential secrets detected!"
            exit 1
          fi
          echo "No secrets detected ✓"

      - name: Verify Python download script syntax
        run: |
          python3 -c "import py_compile; py_compile.compile('scripts/download_full_transcriptome.py', doraise=True)"
          echo "Python script syntax OK ✓"

      - name: Check repository structure
        run: |
          test -f data/raw/kidney.tsv || { echo "ERROR: kidney.tsv not found!"; exit 1; }
          test -f scripts/pipeline_v3.R || { echo "ERROR: pipeline_v3.R not found!"; exit 1; }
          test -f scripts/16_3d_visualizations.R || { echo "ERROR: 16_3d_visualizations.R not found!"; exit 1; }
          test -f scripts/16b_ppi_3d_correlation.R || { echo "ERROR: 16b_ppi_3d_correlation.R not found!"; exit 1; }
          test -f VERSION || { echo "ERROR: VERSION file not found!"; exit 1; }
          test -f README.md || { echo "ERROR: README.md not found!"; exit 1; }
          test -f CITATION.cff || { echo "ERROR: CITATION.cff not found!"; exit 1; }
          echo "Repository structure OK ✓"
